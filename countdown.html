<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纪念日 - 我们的爱情故事</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* 纪念日页面特定样式 */
    .countdown-section {
      text-align: center;
      margin-bottom: 60px;
    }

    .next-memorial {
      background: white;
      border-radius: 25px;
      padding: 50px;
      box-shadow: 0 10px 40px rgba(255, 107, 157, 0.2);
      display: inline-block;
      min-width: 400px;
      animation: scaleIn 0.6s ease-out;
    }

    .memorial-label {
      font-size: 1.3rem;
      color: #666;
      margin-bottom: 10px;
    }

    .memorial-name {
      font-size: 2rem;
      background: linear-gradient(135deg, #ff6b9d 0%, #e91e63 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      font-weight: bold;
    }

    .countdown-display {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .countdown-item {
      background: linear-gradient(135deg, #ffe5ec 0%, #fff5f7 100%);
      padding: 20px 30px;
      border-radius: 15px;
      min-width: 100px;
    }

    .countdown-number {
      font-size: 3rem;
      font-weight: bold;
      color: #ff6b9d;
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.9rem;
      color: #999;
      margin-top: 5px;
    }

    .memorial-date {
      color: #666;
      font-size: 1rem;
    }

    .memorial-list-title {
      text-align: center;
      font-size: 1.8rem;
      color: #ff6b9d;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .memorial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .memorial-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(255, 107, 157, 0.15);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .memorial-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, #ff6b9d, #ffb3c6);
    }

    .memorial-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.25);
    }

    .memorial-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .memorial-card-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
    }

    .memorial-card-badge {
      background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
      color: white;
      padding: 5px 15px;
      border-radius: 15px;
      font-size: 0.85rem;
    }

    .memorial-card-badge.soon {
      background: linear-gradient(135deg, #ff6b9d 0%, #e91e63 100%);
      animation: pulse 1.5s infinite;
    }

    .memorial-card-date {
      color: #666;
      font-size: 1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .memorial-card-countdown {
      color: #ff6b9d;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .timeline-section {
      margin-top: 60px;
    }

    .timeline-title {
      text-align: center;
      font-size: 1.8rem;
      color: #ff6b9d;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .timeline {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 0;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, #ff6b9d, #ffb3c6);
    }

    .timeline-item {
      display: flex;
      justify-content: flex-end;
      padding-right: 50%;
      position: relative;
      margin-bottom: 30px;
    }

    .timeline-item:nth-child(even) {
      justify-content: flex-start;
      padding-right: 0;
      padding-left: 50%;
    }

    .timeline-content {
      background: white;
      padding: 20px 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(255, 107, 157, 0.15);
      max-width: 350px;
      margin-right: 30px;
      position: relative;
    }

    .timeline-item:nth-child(even) .timeline-content {
      margin-right: 0;
      margin-left: 30px;
    }

    .timeline-content::after {
      content: '';
      position: absolute;
      right: -10px;
      top: 20px;
      width: 0;
      height: 0;
      border-left: 10px solid white;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
    }

    .timeline-item:nth-child(even) .timeline-content::after {
      left: -10px;
      right: auto;
      border-left: none;
      border-right: 10px solid white;
    }

    .timeline-dot {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background: #ff6b9d;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 0 0 4px #ffb3c6;
      top: 20px;
    }

    .timeline-date {
      color: #ff6b9d;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .timeline-event {
      color: #333;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .next-memorial {
        min-width: auto;
        width: 100%;
        padding: 30px 20px;
      }

      .countdown-display {
        gap: 10px;
      }

      .countdown-item {
        padding: 15px 20px;
        min-width: 80px;
      }

      .countdown-number {
        font-size: 2rem;
      }

      .memorial-grid {
        grid-template-columns: 1fr;
      }

      .timeline::before {
        left: 20px;
      }

      .timeline-item,
      .timeline-item:nth-child(even) {
        padding-left: 50px;
        padding-right: 0;
        justify-content: flex-start;
      }

      .timeline-content,
      .timeline-item:nth-child(even) .timeline-content {
        margin-left: 20px;
        margin-right: 0;
        max-width: calc(100% - 40px);
      }

      .timeline-content::after,
      .timeline-item:nth-child(even) .timeline-content::after {
        left: -10px;
        right: auto;
        border-left: none;
        border-right: 10px solid white;
      }

      .timeline-dot {
        left: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <span class="logo-icon">💕</span>
        <span>我们的爱情故事</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="album.html">相册</a></li>
        <li><a href="countdown.html" class="active">纪念日</a></li>
        <li><a href="message.html">留言板</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="page-title fade-in">
      <h1>⏰ 纪念日</h1>
      <p>期待每一个特别的日子</p>
    </div>

    <!-- 下一个纪念日倒计时 -->
    <section class="countdown-section">
      <div class="next-memorial">
        <div class="memorial-label">距离下一个纪念日</div>
        <h2 class="memorial-name" id="nextMemorialName">纪念日名称</h2>
        <div class="countdown-display" id="countdownDisplay">
          <div class="countdown-item">
            <div class="countdown-number" id="daysCount">00</div>
            <div class="countdown-label">天</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-number" id="hoursCount">00</div>
            <div class="countdown-label">时</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-number" id="minutesCount">00</div>
            <div class="countdown-label">分</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-number" id="secondsCount">00</div>
            <div class="countdown-label">秒</div>
          </div>
        </div>
        <div class="memorial-date" id="nextMemorialDate"></div>
      </div>
    </section>

    <!-- 纪念日列表 -->
    <h2 class="memorial-list-title">
      <span>💝</span>
      <span>重要纪念日</span>
    </h2>
    <div class="memorial-grid" id="memorialGrid">
      <!-- 纪念日卡片将通过 JS 动态生成 -->
    </div>

    <!-- 恋爱时间线 -->
    <section class="timeline-section">
      <h2 class="timeline-title">
        <span>📖</span>
        <span>恋爱时间线</span>
      </h2>
      <div class="timeline" id="timeline">
        <!-- 时间线项目将通过 JS 动态生成 -->
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <p>用爱记录每一个美好瞬间</p>
    <div class="hearts">💕 💖 💗</div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/countdown.js"></script>
</body>
</html>
