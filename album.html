<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>甜蜜相册 - 我们的爱情故事</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* 相册页特定样式 */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 25px;
      border: 2px solid #ff6b9d;
      background: white;
      color: #ff6b9d;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 107, 157, 0.3);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      padding: 20px 0;
    }

    .photo-item {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(255, 107, 157, 0.15);
      cursor: pointer;
      transition: all 0.3s ease;
      background: white;
    }

    .photo-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
    }

    .photo-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 107, 157, 0.9);
      color: white;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 2;
      backdrop-filter: blur(4px);
    }

    .photo-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .photo-item:hover img {
      transform: scale(1.05);
    }

    .photo-info {
      padding: 20px;
      background: white;
    }

    .photo-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .photo-meta {
      display: flex;
      gap: 15px;
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .photo-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .photo-desc {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .photo-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 107, 157, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      opacity: 0;
    }

    .photo-item:hover .photo-overlay {
      background: rgba(255, 107, 157, 0.1);
      opacity: 1;
    }

    .photo-overlay-icon {
      font-size: 2rem;
      background: white;
      padding: 15px;
      border-radius: 50%;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    /* 灯箱样式 */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fadeIn 0.3s ease;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 80vh;
      position: relative;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 10px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
    }

    .lightbox-info {
      background: white;
      padding: 25px;
      border-radius: 0 0 15px 15px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    .lightbox-title {
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 10px;
    }

    .lightbox-meta {
      color: #999;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .lightbox-desc {
      color: #666;
      line-height: 1.6;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .lightbox-close:hover {
      transform: rotate(90deg);
      background: #ff6b9d;
      color: white;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .lightbox-nav:hover {
      background: #ff6b9d;
      color: white;
    }

    .lightbox-prev {
      left: 20px;
    }

    .lightbox-next {
      right: 20px;
    }

    .no-photos {
      text-align: center;
      padding: 60px;
      color: #999;
    }

    .no-photos-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .photo-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 15px;
      }

      .lightbox-nav {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      .lightbox-prev {
        left: 10px;
      }

      .lightbox-next {
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <span class="logo-icon">💕</span>
        <span>我们的爱情故事</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="album.html" class="active">相册</a></li>
        <li><a href="countdown.html">纪念日</a></li>
        <li><a href="message.html">留言板</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="page-title fade-in">
      <h1>📸 甜蜜相册</h1>
      <p>记录我们在一起的每一个美好瞬间</p>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar fade-in">
      <button class="filter-btn active" data-category="all">全部</button>
      <button class="filter-btn" data-category="旅行">旅行</button>
      <button class="filter-btn" data-category="纪念日">纪念日</button>
      <button class="filter-btn" data-category="日常">日常</button>
    </div>

    <!-- 照片网格 -->
    <div class="photo-grid" id="photoGrid">
      <!-- 照片将通过 JS 动态加载 -->
    </div>
  </main>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
      <div class="lightbox-info">
        <h3 class="lightbox-title" id="lightboxTitle"></h3>
        <div class="lightbox-meta" id="lightboxMeta"></div>
        <p class="lightbox-desc" id="lightboxDesc"></p>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p>用爱记录每一个美好瞬间</p>
    <div class="hearts">💕 💖 💗</div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/album.js"></script>
</body>
</html>
