<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的爱情故事</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <span class="logo-icon">💕</span>
        <span>我们的爱情故事</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="album.html">相册</a></li>
        <li><a href="countdown.html">纪念日</a></li>
        <li><a href="message.html">留言板</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <style>
      /* 首页特定样式 */
      .hero-section {
        text-align: center;
        padding: 60px 20px;
        min-height: calc(100vh - 200px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .couple-names {
        font-size: 2.5rem;
        margin-bottom: 30px;
        animation: fadeIn 1s ease-out;
      }

      .couple-names .name {
        background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: bold;
      }

      .couple-names .heart {
        display: inline-block;
        margin: 0 15px;
        animation: heartbeat 1.5s ease-in-out infinite;
        color: #ff6b9d;
      }

      .love-counter {
        background: white;
        border-radius: 20px;
        padding: 40px 60px;
        box-shadow: 0 10px 40px rgba(255, 107, 157, 0.2);
        margin-bottom: 40px;
        animation: scaleIn 0.8s ease-out;
      }

      .counter-title {
        font-size: 1.2rem;
        color: #666;
        margin-bottom: 15px;
      }

      .counter-number {
        font-size: 5rem;
        font-weight: bold;
        background: linear-gradient(135deg, #ff6b9d 0%, #e91e63 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
      }

      .counter-unit {
        font-size: 2rem;
        color: #ff6b9d;
        margin-top: 10px;
      }

      .anniversary-date {
        margin-top: 20px;
        padding: 15px 30px;
        background: #ffe5ec;
        border-radius: 25px;
        display: inline-block;
        color: #ff6b9d;
        font-weight: 500;
      }

      .story-section {
        max-width: 800px;
        margin: 40px auto;
        text-align: center;
      }

      .story-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(255, 107, 157, 0.15);
        position: relative;
        overflow: hidden;
      }

      .story-card::before {
        content: '"';
        position: absolute;
        top: -20px;
        left: 20px;
        font-size: 8rem;
        color: #ffe5ec;
        font-family: Georgia, serif;
        line-height: 1;
      }

      .story-text {
        font-size: 1.3rem;
        color: #666;
        line-height: 2;
        position: relative;
        z-index: 1;
      }

      .quick-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 40px;
        max-width: 900px;
      }

      .quick-link {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        text-decoration: none;
        color: inherit;
        box-shadow: 0 5px 20px rgba(255, 107, 157, 0.15);
        transition: all 0.3s ease;
      }

      .quick-link:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(255, 107, 157, 0.25);
      }

      .quick-link-icon {
        font-size: 2.5rem;
        margin-bottom: 15px;
      }

      .quick-link-title {
        font-size: 1.1rem;
        font-weight: 500;
        color: #333;
      }

      .quick-link-desc {
        font-size: 0.9rem;
        color: #999;
        margin-top: 8px;
      }

      @media (max-width: 768px) {
        .couple-names {
          font-size: 1.8rem;
        }

        .love-counter {
          padding: 30px 40px;
        }

        .counter-number {
          font-size: 3.5rem;
        }

        .counter-unit {
          font-size: 1.5rem;
        }

        .story-card {
          padding: 25px;
        }

        .story-text {
          font-size: 1.1rem;
        }
      }
    </style>
    <section class="hero-section">
      <!-- 情侣名字 -->
      <div class="couple-names fade-in">
        <span class="name" id="name1">你的名字</span>
        <span class="heart">❤</span>
        <span class="name" id="name2">女朋友名字</span>
      </div>

      <!-- 恋爱计数器 -->
      <div class="love-counter">
        <div class="counter-title">我们已经在一起</div>
        <div class="counter-number" id="loveDays">0</div>
        <div class="counter-unit">天</div>
        <div class="anniversary-date" id="anniversaryDate">
          从 2024年01月01日 开始
        </div>
      </div>

      <!-- 爱情宣言 -->
      <div class="story-section">
        <div class="story-card">
          <p class="story-text" id="storyText">
            我们的爱情故事从这里开始...
          </p>
        </div>
      </div>

      <!-- 快捷导航 -->
      <div class="quick-links">
        <a href="album.html" class="quick-link">
          <div class="quick-link-icon">📸</div>
          <div class="quick-link-title">甜蜜相册</div>
          <div class="quick-link-desc">记录美好瞬间</div>
        </a>
        <a href="countdown.html" class="quick-link">
          <div class="quick-link-icon">⏰</div>
          <div class="quick-link-title">纪念日</div>
          <div class="quick-link-desc">期待每一个特别的日子</div>
        </a>
        <a href="message.html" class="quick-link">
          <div class="quick-link-icon">💌</div>
          <div class="quick-link-title">留言板</div>
          <div class="quick-link-desc">写下想对TA说的话</div>
        </a>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <p>用爱记录每一个美好瞬间</p>
    <div class="hearts">💕 💖 💗</div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/index.js"></script>
  <script src="js/album.js"></script>
  <script src="js/countdown.js"></script>
  <script src="js/message.js"></script>
</body>
</html>
